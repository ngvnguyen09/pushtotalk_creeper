<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hỏi đáp với Creepie</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Load FontAwesome for Mic icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-animation"></div>

    <main class="glass-container">
        <header>
            <h1>Trò chuyện cùng <span>Creepie</span></h1>
            <p>Nhấn vào micro để nói, Creepie sẽ trả lời bạn ngay!</p>
        </header>

        <section class="mic-section">
            <!-- Pulsing ring behind mic -->
            <div class="pulse-ring" id="pulseRing"></div>
            
            <button id="micBtn" class="mic-btn" aria-label="Nhấn để nói">
                <i class="fa-solid fa-microphone"></i>
            </button>
            <div id="micStatusText" class="status-text">Nhấn để bắt đầu nói</div>
        </section>

        <!-- Transcription text -->
        <div class="transcription-container" id="transcriptionContainer" style="display: none;">
            <p id="transcriptionText"></p>
        </div>

        <!-- Bot Queue Status -->
        <section class="queue-status-card" id="queueStatusCard" style="display: none;">
            <div class="status-header">
                <h3>Trạng thái câu hỏi</h3>
                <span id="queueBadge" class="badge">Đang xử lý</span>
            </div>
            
            <div class="progress-track">
                <div class="step processing active" id="stepProcessing">
                    <i class="fa-solid fa-hourglass-half"></i>
                    <span>Đang chờ</span>
                </div>
                <div class="step-line"></div>
                <div class="step answering" id="stepAnswering">
                    <i class="fa-solid fa-volume-high"></i>
                    <span>Đang trả lời</span>
                </div>
                <div class="step-line"></div>
                <div class="step answered" id="stepAnswered">
                    <i class="fa-solid fa-check"></i>
                    <span>Hoàn tất</span>
                </div>
            </div>
            
            <div class="queue-info" id="queueInfo" style="display: none;">
                Bạn đang ở vị trí số <span id="queuePosition">...</span> trong hàng đợi.
            </div>
        </section>

        <!-- Settings icon (Bottom Right) to config API URL -->
        <button id="settingsBtn" class="settings-btn"><i class="fa-solid fa-gear"></i></button>

        <!-- Settings Modal -->
        <div id="settingsModal" class="modal">
            <div class="modal-content glass-card">
                <h2>Cài đặt API</h2>
                <p>Nhập địa chỉ ngrok/cloudflare tunnel của Bot API Server:</p>
                <input type="text" id="apiUrlInput" placeholder="https://example.ngrok-free.app" />
                <button id="saveApiBtn" class="btn-primary">Lưu</button>
                <button id="closeApiBtn" class="btn-secondary">Đóng</button>
            </div>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
